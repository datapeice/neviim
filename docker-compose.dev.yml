services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: inpost-neviim-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: neviim
      POSTGRES_USER: neviim
      POSTGRES_PASSWORD: neviim
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neviim -d neviim"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
