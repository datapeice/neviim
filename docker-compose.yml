services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: inpost-neviim-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: neviim
      POSTGRES_USER: neviim
      POSTGRES_PASSWORD: neviim
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neviim -d neviim"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: inpost-neviim-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/neviim
      SPRING_DATASOURCE_USERNAME: neviim
      SPRING_DATASOURCE_PASSWORD: neviim
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: inpost-neviim-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      - VITE_API_TARGET=http://backend:8080
    depends_on:
      - backend

volumes:
  pgdata:
