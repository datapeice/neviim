services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: inpost-neviim-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: neviim
      POSTGRES_USER: neviim
      POSTGRES_PASSWORD: neviim
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neviim -d neviim"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: inpost-neviim-backend
    restart: unless-stopped
    ports:
      - "8888:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: inpost-neviim-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_TARGET: ${VITE_API_TARGET}
      VITE_ALLOWED_HOSTS: ${VITE_ALLOWED_HOSTS}
    depends_on:
      - backend

volumes:
  pgdata:
